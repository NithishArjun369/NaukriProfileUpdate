name: Naukri Resume Auto Update

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4        # ← Updated v3 to v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4      # ← Updated v3 to v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Run Maven Test
        run: mvn test
        env:
          NAUKRI_USERNAME: ${{ secrets.NAUKRI_USERNAME }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
